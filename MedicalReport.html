<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام التقارير الطبية الاحترافي - 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Times+New+Roman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; background: #f0f2f5; padding: 20px; direction: rtl; }
        .form-card { background: white; max-width: 850px; margin: auto; padding: 30px; border-radius: 12px; border-top: 8px solid #1e4a7a; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Noto Sans Arabic'; }
        .btn-gen { width: 100%; padding: 18px; background: #1e4a7a; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .sh { background: #f8f9fa; padding: 8px; margin: 15px 0; color: #1e4a7a; font-weight: bold; border-right: 4px solid #1e4a7a; }
        .db-section { background: #eff6ff; padding: 15px; border-radius: 8px; border: 1px solid #3b82f6; margin-bottom: 20px; }
        .special-note { font-size: 11px; color: #666; font-weight: normal; margin-top: 2px; }
        .hijri-input { background: #fffdf0 !important; border: 1px solid #ebda8d !important; font-weight: bold; color: #1e4a7a; }
    </style>
</head>
<body>

<div class="form-card">
    <h2 style="text-align:center; color:#1e4a7a;" id="formTitle">إدخال بيانات التقرير الطبي</h2>

    <div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px; background:#f0f5ff; padding:10px; border-radius:8px;">
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:bold;">
            <input type="radio" name="reportType" value="sick" checked onchange="switchType()"> تقرير إجازة مرضية
        </label>
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:bold;">
            <input type="radio" name="reportType" value="companion" onchange="switchType()"> تقرير مرافقة مريض
        </label>
    </div>
    
    
    <div class="db-section">
        <div class="sh" style="margin-top:0;">البحث السريع في قاعدة البيانات</div>
        <div class="grid">
            <div><label>المنطقة</label><select id="selRegion" onchange="updateFilters()"><option value="">-- اختر المنطقة --</option></select></div>
            <div><label>نوع المنشأة</label><select id="selType" onchange="updateFilters()"><option value="">-- اختر النوع --</option><option value="خاص">خاص</option><option value="حكومي">حكومي</option></select></div>
        </div>
        <div class="grid">
            <div>
                <label>المنشأة</label>
                <input type="text" id="hospSearch" placeholder="🔍 ابحث باسم المنشأة..." oninput="updateFilters()" style="margin-bottom:6px; background:#fffbe6; border:1px solid #ffe58f;">
                <select id="selHospital" onchange="updateFilters()"><option value="">-- اختر المنشأة --</option></select>
            </div>
            <div><label>التخصص</label><select id="selSpecialty" onchange="updateFilters()"><option value="">-- اختر التخصص --</option></select></div>
        </div>
        <label>اسم الطبيب</label>
        <select id="selDoctor" onchange="applyDoctorData()"><option value="">-- اختر الطبيب الممارس --</option></select>
    </div>

    <form id="reportForm">
        <div class="sh">التوثيق والنظام (توليد آلي)</div>
        <div class="grid">
            <div>
                <label>رمز الخدمة (Service Code)</label>
                <input type="text" id="serviceCode" style="background: #fffbe6; border: 1px solid #ffe58f;">
            </div>
            <div>
                <label>تاريخ ووقت الطباعة</label>
                <input type="datetime-local" id="printDateTime" style="background: #fffbe6; border: 1px solid #ffe58f;">
            </div>
        </div>

        <div class="sh" id="patientSectionTitle">بيانات المريض والتواريخ</div>
        <div class="grid">
            <div><label id="lblNameAr">الاسم (عربي)</label><input type="text" id="nameAr" required></div>
            <div><label id="lblNameEn">Name (English)</label><input type="text" id="nameEn" dir="ltr" required></div>
        </div>
        <div class="grid">
            <div><label>رقم الهوية / الإقامة</label><input type="text" id="natID" required></div>
            <div><label>الجنسية</label><input type="text" id="nationAr" value="السعودية"></div>
        </div>

        <div id="companionFields" style="display:none; background:#fef9e7; padding:12px; border-radius:8px; border:1px dashed #d4a017; margin-bottom:10px;">
            <div class="grid">
                <div><label>اسم المرافق (عربي)</label><input type="text" id="companionAr"></div>
                <div><label>Companion Name (English)</label><input type="text" id="companionEn" dir="ltr"></div>
            </div>
            <div class="grid">
                <div><label>صلة القرابة (عربي)</label>
                    <select id="relationAr">
                        <option value="أب ">الأب</option>
                        <option value="أم">الأم</option>
                        <option value="الابن">الابن</option>
                        <option value="الابنة">الابنة</option>
                        <option value="زوجة">الزوج</option>
                        <option value="الزوجة">الزوجة</option>
                        <option value="أخ">الأخ</option>
                        <option value="أخت">الأخت</option>
                    </select>
                </div>
                <div><label>Relationship (English)</label>
                    <select id="relationEn">
                        <option value="Father">Father</option>
                        <option value="Mother">Mother</option>
                        <option value="Son">Son</option>
                        <option value="Daughter">Daughter</option>
                        <option value="Husband">Husband</option>
                        <option value="Wife">Wife</option>
                        <option value="Brother">Brother</option>
                        <option value="Sister">Sister</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="grid">
            <div><label>تاريخ الدخول (ميلادي)</label><input type="date" id="dIn" onchange="calc()"></div>
            <div><label>تاريخ الدخول (هجري - قابل للتعديل)</label><input type="text" id="dInHij" class="hijri-input"></div>
        </div>
        <div class="grid">
            <div><label>تاريخ الخروج (ميلادي)</label><input type="date" id="dOut" onchange="calc()"></div>
            <div><label>تاريخ الخروج (هجري - قابل للتعديل)</label><input type="text" id="dOutHij" class="hijri-input"></div>
        </div>
        <div class="grid">
            <div><label>تاريخ الإصدار</label><input type="date" id="dIss"></div>
            <div><label>المدة (أيام)</label><input type="text" id="dur" readonly style="background:#f9f9f9;"></div>
        </div>
        <div class="grid">
            <div><label>جهة العمل (عربي)</label><input type="text" id="empAr" value="الى من يهمه الأمر"></div>
            <div><label>Employer (English)</label><input type="text" id="empEn" value=" " dir="ltr"></div>
        </div>

        <div class="sh">بيانات المنشأة (متقدم)</div>
        <div style="margin-bottom:15px;">
            <label>رابط شعار المنشأة الخاص (اختياري)</label>
            <input type="text" id="customLogo" placeholder="ضع رابط شعار المستشفى هنا..">
        </div>
        <div class="grid">
    <div>
         <label>رقم ترخيص المنشأة (قابل للتعديل)</label>
         <input type="text" id="hospLic" placeholder="أدخل رقم ترخيص المنشأة هنا..">
     </div>
     <div>
         </div>
</div>
        <div class="grid">
            <div><label>اسم المنشأة (عربي)</label><input type="text" id="hospAr" required></div>
            <div><label>Hospital (English)</label><input type="text" id="hospEn" dir="ltr" required></div>
        </div>
        <div class="grid">
            <div><label>اسم الممارس (عربي)</label><input type="text" id="docAr" required></div>
            <div><label>Practitioner (English)</label><input type="text" id="docEn" dir="ltr" required></div>
        </div>
        <div class="grid">
            <div><label>المسمى الوظيفي (عربي)</label><input type="text" id="jobAr" required></div>
            <div><label>Position (English)</label><input type="text" id="jobEn" dir="ltr" required></div>
        </div>
        <input type="hidden" id="resID">

        <button type="button" class="btn-gen" onclick="printReport()">توليد التقرير النهائي</button>
    </form>
</div>

<script>
    function getHijriValue(dateStr) {
        if(!dateStr) return "";
        const date = new Date(dateStr);
        let formatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura-nu-latn', {
            day: '2-digit', month: '2-digit', year: 'numeric'
        }).format(date);
        
        let parts = formatter.split('/');
        return parts[0] + '-' + parts[1] + '-' + parts[2];
    }

    function generate11Digits() {
        return Math.floor(Math.random() * 90000000000) + 10000000000;
    }

    const db = [
        { id: 1, name: "أحمد أبو عامر", nameEn: "Ahmed Abu Amer", degree: "نائب", degreeEn: "Resident", specialty: "باطنية", specialtyEn: "Internal Medicine", hospital: "مجمع صحة الأحمدي", hospitalEn: "Al-Ahmadi Health Complex", region: "المنطقة الشرقية", hospitalType: "حكومي" },
        { id: 2, name: "إيسم بدرون", nameEn: "Esm Badron", degree: "نائب أول", degreeEn: "Senior Resident", specialty: "أنف وأذن وحنجرة", specialtyEn: "ENT", hospital: "مجمع الملك عبدالله الطبي", hospitalEn: "King Abdullah Medical Complex", region: "جدة", hospitalType: "خاص" }
    ];

    function initFilters() {
        const regions = [...new Set(db.map(d => d.region || ""))].filter(r => r);
        const regSel = document.getElementById('selRegion');
        regions.forEach(r => regSel.innerHTML += `<option value="${r}">${r}</option>`);
    }

    function updateFilters() {
        const region = document.getElementById('selRegion').value;
        const type = document.getElementById('selType').value;
        const hospital = document.getElementById('selHospital').value;
        const specialty = document.getElementById('selSpecialty').value;

        const searchTerm = (document.getElementById('hospSearch')?.value || '').trim().toLowerCase();
        const filteredHospitals = [...new Set(db.filter(d => (!region || d.region === region) && (!type || d.hospitalType === type)).map(d => d.hospital))]
            .filter(h => !searchTerm || h.toLowerCase().includes(searchTerm) || (db.find(x => x.hospital === h)?.hospitalEn || '').toLowerCase().includes(searchTerm));
        updateSelect('selHospital', filteredHospitals, hospital);

        const filteredSpecialties = [...new Set(db.filter(d => (!region || d.region === region) && (!type || d.hospitalType === type) && (!hospital || d.hospital === hospital)).map(d => d.specialty))]
            .filter(s => s);
        updateSelect('selSpecialty', filteredSpecialties, specialty);

        const filteredDoctors = db.filter(d => (!region || d.region === region) && (!type || d.hospitalType === type) && (!hospital || d.hospital === hospital) && (!specialty || d.specialty === specialty));
        const docSel = document.getElementById('selDoctor');
        docSel.innerHTML = '<option value="">-- اختر الطبيب الممارس --</option>';
        filteredDoctors.forEach(d => docSel.innerHTML += `<option value="${d.id}">${d.name}</option>`);
    }

    function updateSelect(id, list, current) {
        const el = document.getElementById(id);
        el.innerHTML = '<option value="">-- الكل --</option>';
        list.forEach(item => el.innerHTML += `<option value="${item}" ${item === current ? 'selected' : ''}>${item}</option>`);
    }

    function applyDoctorData() {
        const id = document.getElementById('selDoctor').value;
        if(!id) return;
        const doctor = db.find(x => x.id == id);
        document.getElementById('hospAr').value = doctor.hospital;
        document.getElementById('hospEn').value = doctor.hospitalEn;
        document.getElementById('docAr').value = doctor.name;
        document.getElementById('docEn').value = doctor.nameEn.toUpperCase();
        document.getElementById('jobAr').value = doctor.degree + " " + doctor.specialty;
        document.getElementById('jobEn').value = doctor.degreeEn + " " + doctor.specialtyEn;
        
        const prefix = (doctor.hospitalType === "خاص") ? "PSL" : "GSL";
        const generatedCode = prefix + generate11Digits();
        document.getElementById("serviceCode").value = generatedCode;
        document.getElementById('resID').value = generatedCode;
        document.getElementById('customLogo').value = doctor.hospitalLogo || "";
        document.getElementById('hospLic').value = doctor.hospitalLic || "";
    }

    function calc() {
        const dInVal = document.getElementById("dIn").value;
        const dOutVal = document.getElementById("dOut").value;
        
        if (dInVal) document.getElementById("dInHij").value = getHijriValue(dInVal);
        if (dOutVal) document.getElementById("dOutHij").value = getHijriValue(dOutVal);

        if (dInVal && dOutVal) {
            const d1 = new Date(dInVal);
            const d2 = new Date(dOutVal);
            if (d2 >= d1) {
                const diff = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
                document.getElementById("dur").value = diff;
                document.getElementById("dIss").value = dOutVal;
                
                const now = new Date();
                const time = now.toTimeString().split(' ')[0].substring(0, 5); 
                document.getElementById("printDateTime").value = `${dOutVal}T${time}`;
            }
        }
    }

    function formatDD(dateStr) {
        if(!dateStr) return "";
        var d = dateStr.split('-');
        return d[2] + '-' + d[1] + '-' + d[0];
    }

    function getReportType() {
        return document.querySelector('input[name="reportType"]:checked').value;
    }

    function switchType() {
        const type = getReportType();
        const isComp = type === 'companion';
        document.getElementById('companionFields').style.display = isComp ? 'block' : 'none';
        document.getElementById('formTitle').textContent = isComp ? 'إدخال بيانات تقرير مرافقة مريض' : 'إدخال بيانات التقرير الطبي';
        document.getElementById('patientSectionTitle').textContent = isComp ? 'بيانات المريض والمرافق والتواريخ' : 'بيانات المريض والتواريخ';
    }

    async function saveLeaveToDb(getVal) {
        try {
            const code = getVal('serviceCode');
            const nid  = getVal('natID');
            if (!code || !nid) return;
            const payload = { leave: {
                leaveCode: code, serviceCode: code,
                nationalId: nid, idNumber: nid,
                name: getVal('nameAr'),
                admissionDate: (getVal('dIn')||'').split('T')[0],
                dischargeDate: (getVal('dOut')||'').split('T')[0],
                leaveDuration: getVal('dur') || '',
                doctorName: getVal('docAr'),
                jobTitle: getVal('jobAr'),
                issueDate: getVal('dIss'),
                leaveType: (typeof getReportType==='function' && getReportType()==='companion') ? 'مرافق' : 'إجازة مرضية'
            }};
            await fetch('/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        } catch(e){ console.warn('save failed', e); }
    }
    function printReport() {
        const getVal = (id) => document.getElementById(id).value;
        saveLeaveToDb(getVal);
        const isCompanion = getReportType() === 'companion';
        const logoUrl = getVal('customLogo') || "https://i.postimg.cc/Jz1sqJ6J/Saudi-Ministry-of-Health-Logo-svg.png";


        const printDT = new Date(getVal('printDateTime'));
        var h = printDT.getHours(), m = printDT.getMinutes();
        var ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        var strTime = (h < 10 ? '0'+h : h) + ':' + (m < 10 ? '0'+m : m) + ' ' + ampm;
        var dateNow = printDT.toLocaleDateString('en-GB', {weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'});

        var win = window.open('', '_blank');
        var c = '<html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Times+New+Roman:wght@400;700&display=swap" rel="stylesheet">';
        c += 'body { margin: 0; padding: 50px 60px; font-family: "Noto Sans Arabic", serif; direction: rtl; -webkit-print-color-adjust: exact; print-color-adjust: exact; }';
        c += '.header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; margin-bottom: 30px; }';
        c += '.h-center { text-align: center; } .h-center img { width: 220px; margin-top: 25px; }';
        c += '.t-ar { color: #306db5 !important; font-size: 28px; font-weight: 700; margin-top: 18px;} .t-en { color: #2c3e77 !important; font-size: 22px; font-weight: 700; font-family: "Times New Roman", serif !important; }';
        c += 'table { width: 100%; border-collapse: collapse; margin: 25px 0; border: 1px solid #d4d4d4; table-layout: fixed; }';
        c += 'td { border: 1px solid #d4d4d4; padding: 12px; text-align: center; font-size: 18px; height: 48px; }';
        c += 'td.data-cell, .data-cell span { letter-spacing: -0.3px !important; }';
        c += '.ar-label { font-weight: bold; color: #366fb5 !important; } .en-label { font-family: "Times New Roman", serif !important; color: #366fb5 !important; font-weight: bold; }'; 
        c += '.data-cell { color: #2c3e77 !important; font-family: "Times New Roman", serif !important; font-weight: normal; }'; 
        c += '.date-fix { direction: ltr !important; unicode-bidi: bidi-override !important; display: inline-block; font-family: "Times New Roman", serif !important; color: inherit; font-weight: normal; }';
        c += '.blue { background-color: #1e4a7a !important; color: white !important; } .blue td { color: white !important; }';
        c += '.gray { background-color: #f5f5f5 !important; }';
        c += '.btm { display: flex; justify-content: space-between; margin-top: 40px; align-items: flex-start; }';
        c += '.btm-right { width: 48%; padding-right: 15px; display: flex; flex-direction: column; align-items: center; text-align: center; }';
        c += '.btm-divider { width: 1px; height: 230px; background-color: #d4d4d4; margin: 0 10px; }'; 
        c += '.btm-left { width: 48%; display: flex; flex-direction: column; align-items: center; text-align: center; }';
        c += '.btm-left img { margin-top: -10px !important; }';
        c += '.verify-box { margin-top: 15px !important; }';
        c += '.stamp-box { letter-spacing: -0.8px !important; }';
        c += '.verify-box { margin-top: 5px; text-align: center; width: 100%; }';
        c += '.link-verify { font-family: "Times New Roman", serif !important; font-size: 14px; font-weight: bold; color: blue !important; text-decoration: underline; display: block; line-height: 1.8; }';
        c += '.stamp-box { margin-top: 20px; text-align: left; width: 100%; font-weight: bold; line-height: 1.6; color: #000 !important; font-family: "Times New Roman", serif !important; }';
        c += '@media print { @page { size: A3; margin: 0; } body { padding: 50px 60px; } }';
        c += '</style></head><body onload="window.print()">';
        const titleAr = isCompanion ? 'تقرير مرافقة مريض' : 'تقرير إجازة مرضية';
        const titleEn = isCompanion ? 'Companion SickLeave Report' : 'Sick Leave Report';
        c += '<div class="header"><div style="text-align:right;"><img src="https://i.postimg.cc/k5xY1N5Q/1771635125900.png" height="120"></div><div class="h-center"><img src="https://i.postimg.cc/L4GwNs4M/1771631857257.png"><div class="t-ar">'+titleAr+'</div><div class="t-en">'+titleEn+'</div></div><div style="text-align:left;"><img src="https://i.postimg.cc/9QBmnSBw/sht.png" height="80"></div></div>';

        c += '<table><colgroup><col width="20%"><col width="30%"><col width="30%"><col width="20%"></colgroup>';
        c += '<tr><td class="ar-label">رمز الإجازة</td><td colspan="2" class="data-cell" style="font-size:20px;">'+getVal('serviceCode')+'</td><td class="en-label">Leave ID</td></tr>';
        
        const cleanHij = (v) => (v || '').replace(/هـ?/g, '').replace(/\s+/g, ' ').trim();
        const dInHijClean = cleanHij(getVal('dInHij'));
        const dOutHijClean = cleanHij(getVal('dOutHij'));

        c += '<tr class="blue"><td class="ar-label">مدة الإجازة</td><td style="color:white !important; font-weight:normal;"><span class="date-fix">'+getVal('dur')+'</span> يوم (<span class="date-fix">'+new Date(getVal('dOut')).toLocaleDateString('en-GB')+'</span>)</td><td dir="ltr" style="color:white !important; font-weight:normal;"><span class="date-fix">'+getVal('dur')+'</span> Days</td><td class="en-label">Leave Duration</td></tr>';
        
        c += '<tr><td class="ar-label">تاريخ الدخول</td><td class="data-cell"><span class="date-fix">'+dInHijClean+'</span></td><td class="data-cell"><span class="date-fix">'+formatDD(getVal('dIn'))+'</span></td><td class="en-label">Admission Date</td></tr>';
        c += '<tr class="gray"><td class="ar-label">تاريخ الخروج</td><td class="data-cell"><span class="date-fix">'+dOutHijClean+'</span></td><td class="data-cell"><span class="date-fix">'+formatDD(getVal('dOut'))+'</span></td><td class="en-label">Discharge Date</td></tr>';
        c += '<tr><td class="ar-label">تاريخ إصدار التقرير</td><td colspan="2" class="data-cell"><span class="date-fix">'+formatDD(getVal('dIss'))+'</span></td><td class="en-label">Issue Date</td></tr>';
        
        c += '<tr class="gray"><td class="ar-label">الاسم</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('nameAr')+'</td><td class="data-cell">'+getVal('nameEn').toUpperCase()+'</td><td class="en-label">Name</td></tr>';
        c += '<tr><td class="ar-label">رقم الهوية / الإقامة</td><td colspan="2" class="data-cell">'+getVal('natID')+'</td><td class="en-label">National ID / Iqama</td></tr>';
        
        c += '<tr class="gray"><td class="ar-label">الجنسية</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('nationAr')+'</td><td class="data-cell">Saudi Arabia</td><td class="en-label">Nationality</td></tr>';
        
        c += '<tr><td class="ar-label">جهة العمل</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('empAr')+'</td><td class="data-cell">'+getVal('empEn').toUpperCase()+'</td><td class="en-label">Employer</td></tr>';
        
        if (isCompanion) {
            c += '<tr class="gray"><td class="ar-label">اسم المرافق</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('companionAr')+'</td><td class="data-cell">'+getVal('companionEn').toUpperCase()+'</td><td class="en-label">Companion</td></tr>';
            c += '<tr><td class="ar-label">صلة القرابة</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('relationAr')+'</td><td class="data-cell">'+getVal('relationEn')+'</td><td class="en-label">Relationship</td></tr>';
        }

        const practitionerLabelEn = isCompanion ? 'Physician Name' : 'Practitioner';
        const practitionerLabelAr = isCompanion ? 'اسم الطبيب' : 'اسم الممارس';
        c += '<tr class="gray"><td class="ar-label">'+practitionerLabelAr+'</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('docAr')+'</td><td class="data-cell">'+getVal('docEn')+'</td><td class="en-label">'+practitionerLabelEn+'</td></tr>';
        c += '<tr><td class="ar-label">المسمى الوظيفي</td><td style="color: #2c3e77 !important; font-weight:normal;">'+getVal('jobAr')+'</td><td class="data-cell">'+getVal('jobEn')+'</td><td class="en-label">Position</td></tr></table>';

        
        c += '<div class="btm"><div class="btm-right"><img src="'+logoUrl+'" height="130"><div style="font-weight:700; font-size:16px; margin-top:10px; color:#000000 !important;">'+getVal('hospAr')+'<br><span style="font-family:\'Times New Roman\'; font-weight:700; color:#000000 !important;">'+getVal('hospEn')+'</span><br><span style="font-size:16px; font-weight:700; font-family:\'Noto Sans Arabic\', sans-serif; color:#000000 !important;">'+getVal('hospLic').replace(/class=\'date-fix\'/g, "class=\'date-fix\' style=\'font-weight:bold !important;\'")+'</span></div><div style="margin-top:50px; width:100%; text-align:right;"><img src="https://i.postimg.cc/HsxMYqJX/Smart-Select-20260219-042147-Drive.jpg" height="120"></div></div><div class="btm-divider"></div>';
        c += '<div class="btm-left"><img src="https://i.postimg.cc/RZ5KQNt0/Smart-Select-20260314-050330-Drive.jpg" width="130"><div class="verify-box"><span style="font-size: 13px; font-weight: bold; display: block; line-height: 2.6;">للتحقق من بيانات التقرير يرجى التأكد من زيارة موقع منصة صحة<br>الرسمي</span><span style="font-family:\'Times New Roman\'; font-size: 14px; font-weight: bold; letter-spacing: -0.5px; display: block; line-height: 1.1; margin-top: 1px;">To check the report please visit Seha\'s official website</span><a href="https://seha-h.vercel.app/" target="_blank" class="link-verify">www.seha.sa/#/inquiries/slenquiry</a></div><div class="stamp-box"><span dir="ltr">' + strTime + '</span><br><span>' + dateNow + '</span></div></div></div></body></html>';
        
        win.document.write(c);
        win.document.close();
    }

    window.onload = function() {
        initFilters(); 
        updateFilters(); 
        const now = new Date();
        const date = now.toISOString().split('T')[0];
        const time = now.toTimeString().split(' ')[0].substring(0, 5);
        document.getElementById("printDateTime").value = `${date}T${time}`;
    };
</script>
